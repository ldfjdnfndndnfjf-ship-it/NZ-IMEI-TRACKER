<!DOCTYPE html>
<html>
<head>
    <title>NZ-IMEI-TRACKER</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: monospace; text-align: center; }
        .banner { color: #f00; font-weight: bold; font-size: 22px; margin-bottom: 20px; }
        .input-box { background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 300px; margin-bottom: 10px; }
        button { background: #f00; color: #fff; padding: 10px 20px; cursor: pointer; border: none; }
        #logs { color: #fff; margin-top: 20px; text-align: left; width: 320px; margin: 20px auto; border-left: 2px solid #f00; padding-left: 10px; }
    </style>
</head>
<body>
    <div class="banner">NZ-IMEI-TRACKER<br>Dev: Nawab ZADA Hacker 🦅🙌</div>
    
    <input type="text" id="target" class="input-box" placeholder="Enter IP or IMEI/Cell Data...">
    <br><button onclick="startTrace()">Trace Now!</button>
    
    <div id="logs">Waiting for input...</div>

    <script>
        async function startTrace() {
            let t = document.getElementById('target').value;
            document.getElementById('logs').innerHTML = ">>> Initializing Forensic Scan...<br>>> Bypassing Security Protocols...<br>>> Contacting Neural Database...";
            
            try {
                // IP API Integration (Free)
                let res = await fetch('http://ip-api.com/json/' + t);
                let data = await res.json();
                
                setTimeout(() => {
                    if(data.status === 'success') {
                        document.getElementById('logs').innerHTML = 
                        "--- SCAN COMPLETE ---<br>" +
                        "Target: " + t + "<br>" +
                        "City: " + data.city + "<br>" +
                        "ISP: " + data.isp + "<br>" +
                        "Lat/Lon: " + data.lat + ", " + data.lon + "<br>" +
                        "--- LOCATION Found ---";
                    } else {
                        document.getElementById('logs').innerHTML = "Error: Invalid IP or IMEI format. Try again.";
                    }
                }, 3000);
            } catch (e) {
                document.getElementById('logs').innerHTML = "Error: Connection to Neural Grid Failed!";
            }
        }
    </script>
</body>
</html>
